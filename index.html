    <style>
        body { 
            background-color: #F5F4F8; 
            background-image: radial-gradient(#EBE9F0 1.5px, transparent 1.5px); 
            background-size: 24px 24px; 
            color: #433E4A; 
            font-family: "Zen Maru Gothic", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            padding-bottom: 140px; 
            min-height: 100vh; 
        }
        
        .safe-top-padding { padding-top: max(5rem, env(safe-area-inset-top)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* UI Components */
        .ac-input, .ac-textarea, .ac-select { 
            width: 100% !important; 
            background-color: #FFFFFF; 
            border: 2px solid #D8D4E1; 
            padding: 0.5rem 1rem; 
            color: #433E4A; 
            font-weight: 700; 
            outline: none; 
            transition: all 0.2s; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); 
            box-sizing: border-box !important; 
            max-width: 100% !important; 
        }
        .ac-input:focus, .ac-textarea:focus, .ac-select:focus { border-color: #7A6E8C; }
        .ac-input, .ac-select { border-radius: 9999px; }
        .ac-textarea { border-radius: 1.5rem; }
        .ac-input::placeholder, .ac-textarea::placeholder { color: #B0A9BD; font-weight: 500; }
        
        .ac-select { 
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'%3e%3cpath stroke='%23827A90' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.25rem 1.25rem;
            padding-right: 2.5rem;
        }

        .time-input-fix {
            padding-left: 0.5rem !important;
            padding-right: 0.5rem !important;
            font-size: 0.875rem !important;
            min-width: 0 !important;
            width: 100% !important;
        }

        .input-gray-border { border-color: #D1D5DB; }
        .input-gray-border:focus { border-color: #7A6E8C; }

        .ac-card { background: #FFFFFF; border-radius: 24px; box-shadow: 3px 3px 0px #D8D4E1; border: 2px solid #FFFFFF; overflow: hidden; width: 100%; box-sizing: border-box; }
        
        /* Nav & Tabs */
        .day-tabs-container { display: flex; gap: 8px; padding: 8px 12px; width: 100%; box-sizing: border-box; overflow-x: auto; scrollbar-width: none; }
        .day-tabs-container::-webkit-scrollbar { display: none; }
        .day-pill { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 9999px; font-size: 13px; font-weight: 700; color: #A79EB7; background-color: #FFFFFF; border: 2px solid #D8D4E1; transition: all 0.2s; cursor: pointer; box-shadow: 2px 2px 0px #D8D4E1; min-width: 70px; whitespace-nowrap; }
        .day-pill.active { background-color: #EBE9F0; color: #433E4A; border-color: #7A6E8C; box-shadow: inset 0 2px 4px rgba(122, 110, 140, 0.05); transform: translateY(1px); }
        
        .plan-detail { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #FAFAFA; }
        .plan-detail.expanded { max-height: 2000px; transition: max-height 0.6s ease-in; border-top: 2px dashed #D8D4E1; position: relative; z-index: 10; }
        
        .segment-control { position: relative; display: flex; background-color: #EBE9F0; border-radius: 999px; padding: 4px; cursor: pointer; border: 2px solid #D8D4E1; width: 220px; margin: 0 auto; height: 52px; user-select: none; }
        .segment-glider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background-color: #FFFFFF; border-radius: 999px; box-shadow: 0 2px 8px rgba(122, 110, 140, 0.1); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1; }
        .segment-item { flex: 1; text-align: center; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #A79EB7; transition: color 0.3s ease; position: relative; }
        .segment-control.mode-details .segment-glider { transform: translateX(100%); }
        .segment-control.mode-record .item-record { color: #433E4A; }
        .segment-control.mode-details .item-details { color: #433E4A; }
        
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { 
            font-size: 1.25rem; font-weight: 700; border-radius: 1.5rem; transition: transform 0.2s; 
            display: flex; align-items: center; justify-content: center; user-select: none; cursor: pointer; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); height: 3.5rem; border: 2px solid #EBE9F0; 
            background-color: #FFFFFF; color: #433E4A;
        }
        .calc-btn:active { transform: scale(0.95); }
        .calc-eq { background-color: #7A6E8C; color: #FFFFFF; border-color: #7A6E8C; }
        .modal-overlay { background: rgba(122, 110, 140, 0.4); backdrop-filter: blur(4px); }
        
        /* Nav */
        .nav-btn { 
            flex: 1; display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 0.375rem; 
            height: 3rem; border-radius: 9999px; transition: all 0.2s; font-weight: 700; letter-spacing: 0.1em; color: #827A90; 
        }
        .nav-btn i { font-size: 1.25rem; margin-bottom: 0.125rem; } 
        .nav-btn span { font-size: 13px; }
        .nav-btn.active { background-color: #FDFCFD; color: #5E5470; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .bottom-nav { height: 5.5rem; }
        
        #app { min-height: 100vh; padding-bottom: 160px; }
        
        /* Checkbox */
        .cb-container { display: block; position: relative; padding-left: 35px; margin-bottom: 12px; cursor: pointer; font-size: 16px; user-select: none; }
        .cb-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { position: absolute; top: 0; left: 0; height: 24px; width: 24px; background-color: #fff; border-radius: 8px; border: 2px solid #D8D4E1; }
        .cb-container:hover input ~ .checkmark { background-color: #EBE9F0; }
        .cb-container input:checked ~ .checkmark { background-color: #7A6E8C; border-color: #7A6E8C; }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .cb-container input:checked ~ .checkmark:after { display: block; }
        .cb-container .checkmark:after { left: 8px; top: 4px; width: 6px; height: 12px; border: solid white; border-width: 0 3px 3px 0; transform: rotate(45deg); }
        .item-text { transition: all 0.2s; color: #433E4A; }
        .cb-container input:checked ~ .item-text { text-decoration: line-through; color: #A79EB7; }
        
        /* Buttons */
        .btn-primary, .btn-secondary, .btn-accent { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); transition: all 0.2s; border-width: 2px; border-style: solid; }
        .btn-primary:active, .btn-secondary:active, .btn-accent:active { transform: scale(0.95); }
        .btn-primary { background-color: #7A6E8C; color: #FFFFFF; border-color: #7A6E8C; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background-color: #FFFFFF; color: #433E4A; border-color: #D8D4E1; }
        .btn-secondary:hover { background-color: #EBE9F0; }
        .btn-accent { background-color: #D6CAAA; color: #615C52; border-color: #D6CAAA; }
        .btn-accent:hover { opacity: 0.9; }
        
        /* Grid Layout */
        .shop-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            padding-bottom: 100px;
            padding-top: 10px;
            align-items: start; 
        }
        @media (min-width: 768px) { .shop-grid { grid-template-columns: repeat(3, 1fr); } }
        
        /* Shop Card */
        .shop-card { 
            display: flex; flex-direction: column; height: auto; width: 100%; transition: all 0.3s; position: relative;
            background-color: #FFFFFF; border: 1px solid #D8D4E1; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); overflow: hidden; 
        }
        
        .shop-card-img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            background-color: #F5F4F8;
        }
        
        .shop-card-body {
            display: flex;
            flex-direction: column;
            padding: 12px 16px 16px 16px;
        }

        .shop-card.purchased { 
            background-color: #F9F9FB;
        }
        .shop-card.purchased img {
            filter: grayscale(100%);
            opacity: 0.7;
        }
        .shop-card.purchased h4, 
        .shop-card.purchased p {
            color: #A79EB7;
            text-decoration: line-through;
        }
        
        .badge-purchased {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg) scale(0);
            background-color: rgba(122, 110, 140, 0.95);
            color: white; font-size: 14px; font-weight: bold;
            padding: 6px 16px; border-radius: 50px; border: 2px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 20; pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .shop-card.purchased .badge-purchased { transform: translate(-50%, -50%) rotate(-15deg) scale(1); }
        
        .check-circle { 
            position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; 
            background: rgba(255,255,255,0.95); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; z-index: 30; 
            border: 1px solid #D8D4E1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .check-circle:active { transform: scale(0.9); }
        .check-circle::after { content: ''; width: 16px; height: 16px; border-radius: 50%; background-color: #D8D4E1; transition: background-color 0.2s; }
        .shop-card.purchased .check-circle::after { background-color: #7A6E8C; }

        .dep-btn { 
            width: 100%; padding-top: 0.75rem; padding-bottom: 0.75rem; border-radius: 9999px; font-weight: 700; 
            border: 2px solid #D8D4E1; transition: all 0.2s; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); 
            background-color: #FFFFFF; color: #827A90; 
        }
        .dep-btn:hover { opacity: 0.9; }
        .dep-btn:active { transform: scale(0.95); }
        .dep-btn.active { 
            background-color: #7A6E8C !important; color: #ffffff !important; border-color: #7A6E8C !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
            transform: scale(1.02) !important;
        }
    </style>
</head>

    <script type="module">
        // === Configuration ===
        const config = { currencyRate: 0.2 }; // 日幣大約匯率為 0.2
        const staticData = {
            itinerary: [ 
                { day: 'Day 1', date: '06/24', events: [] }, 
                { day: 'Day 2', date: '06/25', events: [] }, 
                { day: 'Day 3', date: '06/26', events: [] }, 
                { day: 'Day 4', date: '06/27', events: [] },
                { day: 'Day 5', date: '06/28', events: [] },
                { day: 'Day 6', date: '06/29', events: [] },
                { day: 'Day 7', date: '06/30', events: [] }
            ],
            payers: ['公費支付', 'Andy 支付', 'Lynn 支付'],
            paymentMethods: ['現金', '富邦J', '台新Pay', '永豐大戶', '全支付', '全盈pay', '玉山Wallet', 'Suica', 'Paypay'],
            categories: ['餐飲', '購物', '門票', '交通', '住宿', '其他']
        };

        // State
        let state = {
            activeTab: 'plan', activeDay: 0,
            walletMode: 'record', walletDay: 0, walletFilter: 'all', expenseCurrency: 'JPY',
            itinerary: staticData.itinerary,
            expenses: [], 
            expandedEvents: [], deleteTargetId: null, deleteType: null, editingId: null, editingEventId: null,
            checklist: [], 
            checkedItems: JSON.parse(localStorage.getItem('checkedItems') || '{}'),
            shopProducts: [], shopPurchased: {}, 
            shopLocationFilter: 'All',
            shopCategoryFilter: 'All',
            shopHidePurchased: false,
            editingShopOriginalName: null, // 用來追蹤編輯模式
            personalDetailUser: null,
            personalDetailDateFilter: 'All',
            personalDetailCatFilter: 'All',
            expandedCategories: []
        };

        // Cache Load
        const cachedState = localStorage.getItem('seoul2026_cache');
        if (cachedState) {
            try {
                const parsed = JSON.parse(cachedState);
                if (parsed.itinerary && parsed.itinerary.length > 0) state.itinerary = parsed.itinerary;
                if (parsed.expenses) state.expenses = parsed.expenses;
                if (parsed.checklist) state.checklist = parsed.checklist;
                if (parsed.shopProducts) state.shopProducts = parsed.shopProducts;
            } catch(e) { console.warn("Cache error"); }
        }

        // Helpers
        function formatMoney(n) { return Math.round(n).toLocaleString('en-US'); }
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
        function escapeStr(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '"'); }
        function getProductName(item) { return (item['Name'] || item['名稱'] || item['商品名稱'] || '').trim(); }

        function ensureProtocol(url) {
            if (!url) return '';
            url = url.trim();
            if(url.length < 3) return '';
            return url.match(/^https?:\/\//i) ? url : 'https://' + url;
        }

        function normalizeDate(d) {
            if (!d) return '06/24';
            let str = String(d).trim();
            if (/^\d{1,2}\/\d{1,2}$/.test(str)) {
                let parts = str.split('/');
                return parts[0].padStart(2,'0') + '/' + parts[1].padStart(2,'0');
            }
            if (str.includes('T')) {
                try {
                    let date = new Date(str);
                    if(!isNaN(date.getTime())) {
                        let utc = date.getTime() + (date.getTimezoneOffset() * 60000);
                        let seoulDate = new Date(utc + (3600000 * 9));
                        let mm = String(seoulDate.getMonth() + 1).padStart(2, '0');
                        let dd = String(seoulDate.getDate()).padStart(2, '0');
                        return `${mm}/${dd}`;
                    }
                } catch (e) {}
            }
            if (str.includes('T')) str = str.split('T')[0];
            let match = str.match(/(\d{4})?[.\/-]?(\d{1,2})[.\/-](\d{1,2})/);
            if (match) return match[2].padStart(2, '0') + '/' + match[3].padStart(2, '0');
            return str; 
        }

        function normalizeTime(t) {
            if (!t) return '';
            let str = String(t).trim();
            if (str.includes('T')) {
                try {
                    let date = new Date(str);
                    if(!isNaN(date.getTime())) {
                        let hh = String(date.getHours()).padStart(2, '0');
                        let mm = String(date.getMinutes()).padStart(2, '0');
                        return `${hh}:${mm}`;
                    }
                    let match = str.match(/T(\d{2}:\d{2})/);
                    if (match) return match[1];
                } catch(e) {}
            }
            return str.substring(0, 5);
        }

        function getGoogleDriveId(url) {
            if (!url || !url.includes('drive.google.com')) return '';
            try {
                if (url.includes('/file/d/')) return url.split('/file/d/')[1].split('/')[0];
                if (url.includes('id=')) return url.split('id=')[1].split('&')[0];
            } catch (e) { return ''; }
            return '';
        }

        function saveCache() {
            const cache = {
                itinerary: state.itinerary,
                expenses: state.expenses,
                checklist: state.checklist,
                shopProducts: state.shopProducts
            };
            localStorage.setItem('seoul2026_cache', JSON.stringify(cache));
        }

        // --- Core Functions ---
        function toggleWalletMode() {
            state.walletMode = state.walletMode === 'record' ? 'details' : 'record';
            render();
        }

        function toggleCurrency() {
            state.expenseCurrency = state.expenseCurrency === 'JPY' ? 'TWD' : 'JPY';
            const btn = document.getElementById('currBtn');
            if(btn) btn.innerText = state.expenseCurrency === 'JPY' ? '¥' : 'NT$';
        }

        function toggleUneven(val) {
            const box = document.getElementById('unevenBox');
            if(val === '不平均分攤') box.classList.remove('hidden');
            else box.classList.add('hidden');
        }

        function autoCalcSplit(type) {
            const total = Math.round(parseFloat(document.getElementById('exAmt').value)) || 0;
            const spAndy = document.getElementById('spAndy');
            const spLynn = document.getElementById('spLynn');
            
            if (type === 'total') {
                if(!document.getElementById('unevenBox').classList.contains('hidden')) {
                     const half = Math.round(total / 2);
                     spAndy.value = half;
                     spLynn.value = total - half;
                }
            } else if (type === 'andy') {
                const andyVal = Math.round(parseFloat(spAndy.value)) || 0;
                spLynn.value = Math.max(0, total - andyVal);
            } else if (type === 'lynn') {
                const lynnVal = Math.round(parseFloat(spLynn.value)) || 0;
                spAndy.value = Math.max(0, total - lynnVal);
            }
        }

        function submitExpense() {
            const amt = Math.round(parseFloat(document.getElementById('exAmt').value)) || 0;
            if(!amt) return alert('請輸入金額');
            
            const item = {
                id: state.editingId || generateId(),
                date: document.getElementById('exDate').value,
                payer: document.getElementById('exPayer').value,
                method: document.getElementById('exMethod').value,
                amount: amt,
                currency: state.expenseCurrency,
                cat: document.getElementById('exCat').value,
                name: document.getElementById('exName').value,
                note: document.getElementById('exNote').value,
                time: document.getElementById('exTime').value,
                split: document.getElementById('exSplit').value,
                customSplit: {
                    andy: Math.round(parseFloat(document.getElementById('spAndy').value)) || 0,
                    lynn: Math.round(parseFloat(document.getElementById('spLynn').value)) || 0
                }
            };
            
            if(state.editingId) {
                const idx = state.expenses.findIndex(e => e.id === state.editingId);
                if(idx !== -1) state.expenses[idx] = item;
                state.editingId = null;
            } else {
                state.expenses.push(item);
            }
            
            syncData('expense', state.editingId ? 'update' : 'add', { item: item });
            saveCache();
            render();
            alert('已儲存');
        }

        function deleteExpense(id) {
            state.deleteTargetId = id;
            state.deleteType = 'expense';
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function editExpense(id) {
            state.editingId = id;
            state.walletMode = 'record';
            state.activeTab = 'wallet';
            if (state.personalDetailUser !== null) state.personalDetailUser = null;
            render();
        }

        function cancelEdit() {
            state.editingId = null;
            render();
        }

        function openDepositModal() { document.getElementById('depositModal').classList.remove('hidden'); }

        function setDepositSource(src) {
            document.getElementById('depositSource').value = src;
            document.querySelectorAll('.dep-btn').forEach(b => {
                if(b.dataset.source === src) b.classList.add('active');
                else b.classList.remove('active');
            });
        }

        function submitDeposit() {
            const amt = Math.round(parseFloat(document.getElementById('depositAmount').value)) || 0;
            const src = document.getElementById('depositSource').value;
            const date = document.getElementById('depDate').value;
            
            if(!amt || !src) return alert('請填寫完整');
            
            const item = {
                id: generateId(), date: date, cat: '公費入金', amount: amt, currency: 'JPY', 
                payer: src, method: '現金', name: '公費儲值', time: new Date().toTimeString().slice(0,5)
            };
            
            state.expenses.push(item);
            syncData('expense', 'add', { item: item });
            saveCache();
            document.getElementById('depositModal').classList.add('hidden');
            render();
        }

        function openCalc() { document.getElementById('calcModal').classList.remove('hidden'); calcClear(); }
        function closeCalc() { document.getElementById('calcModal').classList.add('hidden'); }
        function calcAppend(val) { 
            const d = document.getElementById('calcDisplay');
            if(d.innerText === '0') d.innerText = val;
            else d.innerText += val;
        }
        function calcClear() { document.getElementById('calcDisplay').innerText = '0'; }
        function calcBackspace() {
            const d = document.getElementById('calcDisplay');
            if(d.innerText.length > 1) d.innerText = d.innerText.slice(0, -1);
            else d.innerText = '0';
        }
        function calcConfirm() {
            try {
                const res = eval(document.getElementById('calcDisplay').innerText);
                document.getElementById('exAmt').value = Math.round(res);
                closeCalc();
                autoCalcSplit('total');
            } catch(e) { document.getElementById('calcDisplay').innerText = 'Error'; }
        }

        function toggleEvent(id) {
            if(state.expandedEvents.includes(id)) state.expandedEvents = state.expandedEvents.filter(e => e !== id);
            else state.expandedEvents.push(id);
            render();
        }

        function startEdit(id) {
            state.editingEventId = id;
            if(!state.expandedEvents.includes(id)) state.expandedEvents.push(id);
            render();
        }

        function updateVal(id, field, val) {
            const day = state.itinerary[state.activeDay];
            const evt = day.events.find(e => e.id === id);
            if(evt) evt[field] = val;
        }

        function saveAndClose(id) {
            const day = state.itinerary[state.activeDay];
            const evt = day.events.find(e => e.id === id);
            state.editingEventId = null;
            saveCache();
            render();
            if(evt) syncData('itinerary', 'update', { dayIdx: state.activeDay, event: evt });
        }

        function addEvent() {
            const newId = generateId();
            const newEvt = { id: newId, time: '', title: '新行程', cost: '', transport: '', food: '', note: '', link: '' };
            state.itinerary[state.activeDay].events.push(newEvt);
            state.editingEventId = newId;
            state.expandedEvents.push(newId);
            render();
            syncData('itinerary', 'add', { dayIdx: state.activeDay, event: newEvt });
        }

        function askDelete(id) {
            state.deleteTargetId = id;
            state.deleteType = 'event';
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function confirmDelete() {
             if(state.deleteType === 'event') {
                 const day = state.itinerary[state.activeDay];
                 day.events = day.events.filter(e => e.id !== state.deleteTargetId);
                 syncData('itinerary', 'delete', { dayIdx: state.activeDay, event: { id: state.deleteTargetId } });
             } else if (state.deleteType === 'expense') {
                 state.expenses = state.expenses.filter(e => e.id !== state.deleteTargetId);
                 syncData('expense', 'delete', { id: state.deleteTargetId });
             } else if (state.deleteType === 'shop') {
                 // 刪除商品邏輯
                 state.shopProducts = state.shopProducts.filter(p => getProductName(p) !== state.deleteTargetId);
                 delete state.shopPurchased[state.deleteTargetId];
                 syncShopDelete(state.deleteTargetId);
             }
             state.deleteTargetId = null;
             document.getElementById('deleteModal').classList.add('hidden');
             saveCache();
             render();
        }

        function setupShopTabs() {
            const locContainer = document.getElementById('shopLocationSelect');
            const catContainer = document.getElementById('shopCategorySelect');
            if(!locContainer || !catContainer) return;
            
            const locations = new Set();
            const categories = new Set();
            
            state.shopProducts.forEach(item => {
                const loc = (item['Location'] || item['地點'] || '未分類').trim();
                if(loc) locations.add(loc);
                
                if (state.shopLocationFilter === 'All' || loc === state.shopLocationFilter) {
                    const cat = (item['Category'] || item['類別'] || '未分類').trim();
                    if(cat) categories.add(cat);
                }
            });
            
            let locHtml = `<option value="All" ${state.shopLocationFilter==='All'?'selected':''}>📍 所有地點</option>`;
            locations.forEach(loc => { locHtml += `<option value="${escapeStr(loc)}" ${state.shopLocationFilter===loc?'selected':''}>📍 ${loc}</option>`; });
            locContainer.innerHTML = locHtml;
            
            let catHtml = `<option value="All" ${state.shopCategoryFilter==='All'?'selected':''}>🏷️ 全部分類</option>`;
            categories.forEach(cat => { catHtml += `<option value="${escapeStr(cat)}" ${state.shopCategoryFilter===cat?'selected':''}>🏷️ ${cat}</option>`; });
            catContainer.innerHTML = catHtml;
        }

            setupShopTabs();
            render();

        // --- Shop Form Modal (Add & Edit) ---
        function openShopFormModal(mode = 'add', itemName = null) {
            const locSelect = document.getElementById('newShopLoc');
            const catSelect = document.getElementById('newShopCat');
            const title = document.getElementById('shopModalTitle');
            const btnDelete = document.getElementById('btnShopDelete');

            const locations = new Set();
            const categories = new Set();
            state.shopProducts.forEach(item => {
                const loc = (item['Location'] || item['地點'] || '').trim();
                if (loc && loc !== '未分類') locations.add(loc);
                const cat = (item['Category'] || item['類別'] || '').trim();
                if (cat && cat !== '未分類') categories.add(cat);
            });

            let locHtml = '<option value="" disabled selected>請選擇地點...</option>';
            locations.forEach(loc => { locHtml += `<option value="${escapeStr(loc)}">${escapeStr(loc)}</option>`; });
            locHtml += '<option value="__NEW__">➕ 新增自訂地點...</option>';
            locSelect.innerHTML = locHtml;

            let catHtml = '<option value="" disabled selected>請選擇分類...</option>';
            categories.forEach(cat => { catHtml += `<option value="${escapeStr(cat)}">${escapeStr(cat)}</option>`; });
            catHtml += '<option value="__NEW__">➕ 新增自訂分類...</option>';
            catSelect.innerHTML = catHtml;

            const statusTxt = document.getElementById('uploadStatus');
            statusTxt.classList.add('hidden');
            statusTxt.innerText = '';
            document.getElementById('customShopLoc').classList.add('hidden');
            document.getElementById('customShopCat').classList.add('hidden');

            if (mode === 'edit' && itemName) {
                state.editingShopOriginalName = itemName;
                title.innerText = '📝 編輯商品';
                btnDelete.classList.remove('hidden');

                const item = state.shopProducts.find(p => getProductName(p) === itemName);
                if (item) {
                    document.getElementById('newShopName').value = itemName;
                    document.getElementById('newShopImg').value = item['Image'] || item['圖片'] || '';
                    document.getElementById('newShopDesc').value = item['Description'] || item['描述'] || '';
                    document.getElementById('newShopPrice').value = item['actual price'] || item['實際價格'] || '';
                    
                    const loc = (item['Location'] || item['地點'] || '未分類').trim();
                    if (locations.has(loc)) locSelect.value = loc;
                    else { locSelect.value = '__NEW__'; document.getElementById('customShopLoc').value = loc; document.getElementById('customShopLoc').classList.remove('hidden'); }

                    const cat = (item['Category'] || item['類別'] || '未分類').trim();
                    if (categories.has(cat)) catSelect.value = cat;
                    else { catSelect.value = '__NEW__'; document.getElementById('customShopCat').value = cat; document.getElementById('customShopCat').classList.remove('hidden'); }
                }
            } else {
                state.editingShopOriginalName = null;
                title.innerText = '🛍️ 新增必買商品';
                btnDelete.classList.add('hidden');
                
                document.getElementById('newShopName').value = '';
                document.getElementById('newShopImg').value = '';
                document.getElementById('newShopDesc').value = '';
                document.getElementById('newShopPrice').value = '';
                document.getElementById('customShopLoc').value = '';
                document.getElementById('customShopCat').value = '';
            }

            document.getElementById('shopFormModal').classList.remove('hidden');
        }

            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const statusTxt = document.getElementById('uploadStatus');
            statusTxt.classList.remove('hidden', 'text-func-red', 'text-sage-dark');
            statusTxt.classList.add('text-ac-blue');
            statusTxt.innerText = '圖片處理中... (0%)';

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    statusTxt.innerText = '圖片壓縮中... (50%)';
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_SIZE = 800;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    const base64Data = dataUrl.split(',')[1];
                    
                    statusTxt.innerText = '正在上傳至 Google Drive... (請稍候)';
                    
                    fetch(SHOP_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'uploadImage', filename: file.name || 'upload.jpg', mimeType: 'image/jpeg', data: base64Data })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'success') {
                            document.getElementById('newShopImg').value = data.url;

        function submitShopItem() {
            const name = document.getElementById('newShopName').value.trim();
            if (!name) return alert('商品名稱為必填項目！');

            let loc = document.getElementById('newShopLoc').value;
            if (loc === '__NEW__') loc = document.getElementById('customShopLoc').value.trim();
            if (!loc) loc = '未分類';

            let cat = document.getElementById('newShopCat').value;
            if (cat === '__NEW__') cat = document.getElementById('customShopCat').value.trim();
            if (!cat) cat = '未分類';

            const img = document.getElementById('newShopImg').value.trim();
            const desc = document.getElementById('newShopDesc').value.trim();
            const price = document.getElementById('newShopPrice').value.trim();

            const newItem = { "Name": name, "Location": loc, "Category": cat, "Image": img, "Description": desc, "actual price": price, "Status": "" };

            if (state.editingShopOriginalName) {
                // 編輯模式
                const oldName = state.editingShopOriginalName;
                const existingIndex = state.shopProducts.findIndex(p => getProductName(p) === oldName);
                if (existingIndex >= 0) {
                    state.shopProducts[existingIndex] = newItem;
                }
                
                // 如果更換了名字，也要同步轉移已購買狀態
                if (oldName !== name) {
                    if (state.shopPurchased[oldName] !== undefined) {
                        state.shopPurchased[name] = state.shopPurchased[oldName];
                        delete state.shopPurchased[oldName];
                    }
                }

                syncShopUpdate(oldName, { name: name, location: loc, category: cat, image: img, description: desc, actualPrice: price });
            } else {
                // 新增模式
                state.shopPurchased[name] = false;
                const existingIndex = state.shopProducts.findIndex(p => getProductName(p) === name);
                if(existingIndex >= 0) state.shopProducts[existingIndex] = newItem;
                else state.shopProducts.unshift(newItem); 
                
                syncShopAdd(name, loc, cat, img, desc, price);
            }

            saveCache();
            closeShopFormModal();
            render();
        }

        function drawPieChart(canvasId, data) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            
            ctx.clearRect(0, 0, rect.width, rect.height);
            
            const total = Object.values(data).reduce((a, b) => a + b, 0);
            if (total === 0) {
                ctx.fillStyle = '#827A90';
                ctx.font = '13px "Zen Maru Gothic"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('此條件下無消費數據 🪻', rect.width / 2, rect.height / 2);
                return;
            }
            
            const colors = { '餐飲': '#C99494', '購物': '#D6CAAA', '門票': '#94A4C2', '交通': '#A79EB7', '住宿': '#7A6E8C', '其他': '#9C897B' };
            
            let startAngle = -Math.PI / 2;
            const centerX = rect.width / 3;
            const centerY = rect.height / 2;
            const radius = Math.min(centerX, centerY) * 0.75;
            
            for (const [cat, val] of Object.entries(data)) {
                if (val === 0) continue;
                const sliceAngle = (val / total) * 2 * Math.PI;
                ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle); ctx.closePath();
                ctx.fillStyle = colors[cat] || '#B0A9BD'; ctx.fill();
                startAngle += sliceAngle;
            }
            
            let legendY = 20;
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.font = 'bold 11px "Zen Maru Gothic"';
            
            for (const [cat, val] of Object.entries(data)) {
                if (val === 0) continue;
                const percent = Math.round((val / total) * 100);
                ctx.fillStyle = colors[cat] || '#B0A9BD'; ctx.fillRect(rect.width - 120, legendY - 5, 10, 10);
                ctx.fillStyle = '#433E4A'; ctx.fillText(`${cat} ${percent}%`, rect.width - 105, legendY);
                legendY += 18;
            }
        }

        function syncData(type, action, data) {
            let targetUrl = ''; let payload = { action: action };

            if (type === 'itinerary') {
                targetUrl = ITINERARY_API_URL;
                if(action === 'delete') { payload.id = data.event.id; payload.sheetName = state.itinerary[data.dayIdx].day; } 
                else {
                    const currentDayObj = state.itinerary[data.dayIdx];
                    payload.sheetName = (data.event && data.event.sheetName) ? data.event.sheetName : currentDayObj.day;
                    if (data.event) {
                        payload.id = data.event.id; payload.day = currentDayObj.day; payload.date = currentDayObj.date;
                        payload.time = data.event.time || ''; payload.title = data.event.title || ''; payload.transport = data.event.transport || '';
                        payload.food = data.event.food || ''; payload.cost = data.event.cost || ''; payload.link = data.event.link || ''; payload.note = data.event.note || '';
                    }
                }
            } else if (type === 'expense') {
                targetUrl = WALLET_API_URL;
                if(action === 'delete') payload.id = data.id;
                else payload.item = data.item;
            }

            const dot = document.getElementById('syncDot'); const txt = document.getElementById('syncText');
            if(dot) dot.className = 'w-2 h-2 rounded-full bg-btn-yellow animate-pulse'; if(txt) txt.innerText = '傳送中...';

            return fetch(targetUrl, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify(payload) })
            .then(() => {
                if(dot) dot.className = 'w-2 h-2 rounded-full bg-sage-dark'; if(txt) txt.innerText = '已儲存';
                setTimeout(() => { if(txt) txt.innerText = '已同步'; }, 2000);
            }).catch(e => { console.error("Sync Error", e); });
        }

        function loadAllData() {
            const btn = document.getElementById('syncText'); const dot = document.getElementById('syncDot');
            if(btn) btn.innerText = '讀取中...'; if(dot) dot.className = 'w-2 h-2 rounded-full bg-btn-yellow animate-pulse';
            
            const p1 = fetch(ITINERARY_API_URL + '?t=' + Date.now()).then(r => r.ok ? r.json() : []);
            const p2 = fetch(WALLET_API_URL + '?t=' + Date.now()).then(r => r.ok ? r.json() : []);
            
            try { loadChecklistData(); } catch(e) { console.error("Checklist load failed", e); }
            try { loadShopData(); } catch(e) { console.error("Shop load failed", e); }

            Promise.all([p1, p2])
                .then(([itinData, walletData]) => {
                    if (Array.isArray(itinData)) {
                        const newItinerary = [
                            { day: 'Day 1', date: '06/24', events: [] }, { day: 'Day 2', date: '06/25', events: [] }, { day: 'Day 3', date: '06/26', events: [] },
                            { day: 'Day 4', date: '06/27', events: [] }, { day: 'Day 5', date: '06/28', events: [] }, { day: 'Day 6', date: '06/29', events: [] }, { day: 'Day 7', date: '06/30', events: [] }
                        ];
                        itinData.forEach((row, rowIndex) => {
                            let targetDayStr = row.day || row.sheetName; 
                            if (!targetDayStr) return;
                            const dayIdx = (parseInt(targetDayStr.toString().replace(/\D/g,'')) || 1) - 1;
                            if (newItinerary[dayIdx]) {
                                let cleanId = row.id ? row.id.toString().replace(/^'/, '') : 'evt_' + Date.now() + '_' + rowIndex;
                                newItinerary[dayIdx].events.push({
                                    sheetName: row.sheetName, id: cleanId, time: row.time ? row.time.toString() : '', title: row.title || '', 
                                    transport: row.transport || '', food: row.food || '', cost: row.cost || '', link: row.link || '', note: row.note || ''
                                });
                                if (row.date) newItinerary[dayIdx].date = normalizeDate(row.date);
                            }
                        });
                        state.itinerary = newItinerary;
                    }
                    if (Array.isArray(walletData)) {
                        state.expenses = walletData.map(item => {
                             let cSplit = item.customsplit;
                             if (typeof cSplit === 'string' && cSplit.startsWith('{')) { try { cSplit = JSON.parse(cSplit); } catch(e){} }
                             return {
                                ...item, id: (item.w_id || item.id || generateId()).toString().replace(/^'/, ''), amount: parseFloat(item.w_amount || item.amount) || 0,
                                customSplit: cSplit, date: normalizeDate(item.date || '06/24'), time: normalizeTime(item.time),
                                note: item.w_note || item.note || '', method: item.w_method || item.method || ''
                             };
                        });
                    }
                    
                    saveCache(); render();
                    if(btn) btn.innerText = '已更新'; if(dot) dot.className = 'w-2 h-2 rounded-full bg-sage-dark';
                })
                .catch(err => {
                    console.error("Load Error", err);
                    if(btn) btn.innerText = '讀取失敗'; if(dot) dot.className = 'w-2 h-2 rounded-full bg-func-red';
                }).finally(() => { render(); });
                
            setTimeout(() => { if(btn && btn.innerText === '讀取中...') { btn.innerText = '連線逾時'; if(dot) dot.className = 'w-2 h-2 rounded-full bg-gray-400'; } }, 10000);
        }

        }

        function renderShop(c) {
            let html = `<div class="flex justify-between items-center mb-4 fade-in"><button onclick="window.toggleHidePurchased()" class="text-xs font-bold flex items-center gap-1.5 px-3 py-1.5 rounded-full border-2 transition-all ${state.shopHidePurchased ? 'bg-sage-dark text-white border-sage-dark shadow-sm' : 'bg-white text-text-sub border-[#D8D4E1] hover:bg-sage-pale'} active:scale-95"><i class="fa-solid ${state.shopHidePurchased ? 'fa-eye-slash' : 'fa-eye'}"></i>${state.shopHidePurchased ? '已隱藏買完' : '隱藏已買完'}</button><button onclick="window.openShopFormModal('add')" class="text-sm bg-sage-dark text-white px-5 py-2 rounded-full font-bold shadow-sm transition active:scale-95"><i class="fa-solid fa-plus mr-1"></i>新增商品</button></div>`;

            const list = state.shopProducts.filter(item => {
                const name = getProductName(item);
                const loc = (item['Location'] || item['地點'] || '未分類').trim();
                const cat = (item['Category'] || item['類別'] || '未分類').trim();
                const locMatch = state.shopLocationFilter === 'All' || loc === state.shopLocationFilter;
                const catMatch = state.shopCategoryFilter === 'All' || cat === state.shopCategoryFilter;
                const isPurchased = state.shopPurchased[name] === true;
                const hideMatch = state.shopHidePurchased ? !isPurchased : true;
                return locMatch && catMatch && hideMatch;
            });
            
            if(list.length === 0) { html += '<div class="text-center text-text-sub mt-6 py-10 border-2 border-dashed border-[#D8D4E1] rounded-3xl">尚無符合條件的商品資料</div>'; c.innerHTML = html; return; }

            html += `<div class="shop-grid fade-in">`;
            list.forEach(item => {
                const name = getProductName(item);
                const desc = item['Description'] || item['描述'] || '';
                const actualPrice = item['actual price'] || item['實際價格'] || item['Actual Price'] || '';
                const imageRaw = item['Image'] || item['image'] || item['圖片'] || '';
                const gid = getGoogleDriveId(imageRaw);
                const isPurchased = state.shopPurchased[name] === true;
                const safeName = name.replace(/'/g, "\\'").replace(/"/g, '"');
                
                let imgTag = `<div class="w-full h-full bg-sage-pale flex items-center justify-center text-xs text-gray-400">No Image</div>`;
                if(gid) imgTag = `<img src="https://lh3.googleusercontent.com/d/${gid}=s400" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://placehold.co/200?text=No+Image'">`;
                else if(imageRaw) imgTag = `<img src="${imageRaw}" class="w-full h-full object-cover" loading="lazy">`;

                html += `
                <div class="shop-card ${isPurchased ? 'purchased' : ''}">
                    <div class="shop-card-img-container">
                        ${imgTag}
                        <div class="badge-purchased">Purchased</div>
                        <div class="check-circle" onclick="window.toggleShopItem(event, '${safeName}')"></div>
                    </div>
                    <div class="shop-card-body flex-1 flex flex-col relative">
                        <div class="flex justify-between items-start gap-2 mb-2">
                            <h4 class="text-text-main font-[600] text-sm leading-tight whitespace-normal break-words">${escapeStr(name)}</h4>
                            <button onclick="window.openShopFormModal('edit', '${safeName}')" class="text-sage-dark hover:scale-110 flex-shrink-0 bg-sage-pale w-6 h-6 rounded-full flex items-center justify-center transition shadow-sm"><i class="fa-solid fa-pen text-[10px]"></i></button>
                        </div>
                        <p class="text-text-sub text-xs whitespace-normal break-words leading-relaxed mb-2">${escapeStr(desc)}</p>
                        ${actualPrice ? `<div class="mt-auto text-xs font-bold text-func-red bg-red-50 w-fit px-2 py-0.5 rounded-md border border-red-100 shadow-sm">💰 ¥${escapeStr(actualPrice)}</div>` : ''}
                    </div>
                </div>`;
            });
            html += `</div>`;
            c.innerHTML = html;
        }
        
        function renderList(c) {
            const groups = {};
            if (Array.isArray(state.checklist)) { state.checklist.forEach(i => { if(!i || !i.category) return; if(!groups[i.category]) groups[i.category] = []; groups[i.category].push(i.item); }); }

            let html = `<div class="pb-24 fade-in space-y-4">`;
            for(let cat in groups) {
                const isExpanded = state.expandedCategories.includes(cat);
                const arrowClass = isExpanded ? 'rotate-180' : ''; const contentClass = isExpanded ? '' : 'hidden';
                html += `<div class="bg-white rounded-[1.5rem] shadow-sm border-2 border-[#D8D4E1] overflow-hidden transition-all duration-300"><div onclick="window.toggleCategory('${escapeStr(cat)}')" class="flex justify-between items-center p-4 cursor-pointer hover:bg-white transition select-none"><h3 class="font-black text-lg text-sage-dark flex items-center gap-2"><i class="fa-solid fa-list-check text-base opacity-70"></i> ${cat} <span class="text-xs bg-sage-pale text-sage-dark px-2 py-0.5 rounded-full ml-1">${groups[cat].length}</span></h3><div class="w-8 h-8 rounded-full bg-sage-pale flex items-center justify-center text-sage-dark transition-transform duration-300 ${arrowClass}"><i class="fa-solid fa-chevron-down"></i></div></div><div class="${contentClass} px-4 pb-4 pt-0 border-t border-dashed border-[#D8D4E1]"><div class="pt-3 space-y-2">`;
                groups[cat].forEach(itemText => { const checked = state.checkedItems[itemText] ? 'checked' : ''; html += `<label class="cb-container"><input type="checkbox" ${checked} onchange="window.toggleCheck('${escapeStr(itemText)}')"><span class="checkmark"></span><span class="item-text font-bold text-sm text-text-main">${itemText}</span></label>`; });
                html += `</div></div></div>`;
            }
            if(Object.keys(groups).length === 0) html += `<div class="text-center text-gray-400 mt-10 py-10 border-2 border-dashed border-[#D8D4E1] rounded-3xl">載入清單中...</div>`;
            html += `</div>`;
            c.innerHTML = html;
        }

        function render() {
            try {
                const app = document.getElementById('app'); if(!app) return;
                const dayTabs = document.getElementById('dayTabsContainer'); const walletTabs = document.getElementById('walletToggleWrapper'); const shopTabs = document.getElementById('shopTabsContainer'); 

                if(dayTabs) { dayTabs.classList.add('hidden'); dayTabs.classList.remove('day-tabs-container'); }
                if(walletTabs) walletTabs.classList.add('hidden');
                if(shopTabs) shopTabs.classList.add('hidden');
                app.innerHTML = '';
                
                if(state.activeTab === 'wallet' && state.walletMode === 'details' && state.personalDetailUser !== null) { app.className = "safe-top-padding px-4 max-w-md mx-auto relative z-10 pt-24"; renderPersonalDetails(app); return; }

                app.className = "safe-top-padding px-4 max-w-md mx-auto relative z-10 pt-48";

                if(state.activeTab === 'plan') {
                    if(dayTabs) { dayTabs.innerHTML = state.itinerary.map((d, i) => `<div onclick="window.switchDay(${i})" class="day-pill ${i === state.activeDay ? 'active' : ''}">${d.day}</div>`).join(''); dayTabs.classList.remove('hidden'); dayTabs.classList.add('day-tabs-container'); }
                    renderPlan(app);
                } 
                else if(state.activeTab === 'wallet') {
                    if(walletTabs) walletTabs.classList.remove('hidden');
                    const sw = document.getElementById('walletToggle');
                    if(state.walletMode === 'record') { 
                        if(sw) { sw.classList.add('mode-record'); sw.classList.remove('mode-details'); }
                        app.className = "safe-top-padding px-4 max-w-md mx-auto relative z-10 pt-52";
                        renderWalletRecord(app); 
                    } else { 
                        if(dayTabs) {
                            let tabsHtml = `<div onclick="window.switchDay('all')" class="day-pill ${state.walletDay === 'all' ? 'active' : ''}">全部</div>`;
                            tabsHtml += state.itinerary.map((d, i) => `<div onclick="window.switchDay(${i})" class="day-pill ${i === state.walletDay ? 'active' : ''}">${d.day}</div>`).join('');
                            dayTabs.innerHTML = tabsHtml; dayTabs.classList.remove('hidden'); dayTabs.classList.add('day-tabs-container');
                        }
                        if(sw) { sw.classList.remove('mode-record'); sw.classList.add('mode-details'); }
                        app.className = "safe-top-padding px-4 max-w-md mx-auto relative z-10 pt-52";
                        renderWalletDetails(app); 
                    }
                }
                else if(state.activeTab === 'list') { app.className = "safe-top-padding px-4 max-w-md mx-auto relative z-10 pt-24"; renderList(app); }
                else if(state.activeTab === 'shop') {
                    if(shopTabs) shopTabs.classList.remove('hidden');
                    setupShopTabs();
                    app.className = "safe-top-padding px-4 max-w-md mx-auto relative z-10 pt-[11rem]";
                    renderShop(app);
                }
            } catch(e) { console.error("Render error:", e); const app = document.getElementById('app'); if(app) app.innerHTML = `<div class="text-red-500 p-4">渲染錯誤: ${e.message}</div>`; }
        }

        window.toggleWalletMode = toggleWalletMode; window.toggleCurrency = toggleCurrency; window.toggleUneven = toggleUneven; window.autoCalcSplit = autoCalcSplit;
        window.submitExpense = submitExpense; window.openDepositModal = openDepositModal; window.setDepositSource = setDepositSource; window.submitDeposit = submitDeposit; window.deleteExpense = deleteExpense; window.editExpense = editExpense; window.cancelEdit = cancelEdit; window.openCalc = openCalc; window.closeCalc = closeCalc; window.calcAppend = calcAppend; window.calcClear = calcClear; window.calcBackspace = calcBackspace; window.calcConfirm = calcConfirm; window.toggleEvent = toggleEvent; window.startEdit = startEdit; window.updateVal = updateVal; window.saveAndClose = saveAndClose; window.addEvent = addEvent; window.askDelete = askDelete; window.confirmDelete = confirmDelete; window.toggleCheck = toggleCheck; window.toggleCategory = toggleCategory;
        
        window.filterShopLocation = filterShopLocation; window.filterShopCategory = filterShopCategory; window.toggleShopItem = toggleShopItem; window.toggleHidePurchased = toggleHidePurchased;
        window.openShopFormModal = openShopFormModal; window.closeShopFormModal = closeShopFormModal; window.handleShopAddChange = handleShopAddChange; window.submitShopItem = submitShopItem; window.handleImageUpload = handleImageUpload; window.askDeleteShop = askDeleteShop;

        window.openPersonalDetails = openPersonalDetails; window.closePersonalDetails = closePersonalDetails; window.filterPersonalDetails = filterPersonalDetails;
        
        window.switchDay = switchDay; window.router = router; window.loadAllData = loadAllData; window.render = render;

        try { window.render(); } catch(e) { console.error("Initial setup failed", e); }
        loadAllData();
    </script>
</body>
</html>
